<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Workout" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <title>Workout Tracker</title>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            indigo: {
              400: '#818cf8',
              500: '#6366f1',
              600: '#4f46e5',
              700: '#4338ca',
            }
          }
        }
      }
    }
  </script>
  <style>
    * { -webkit-tap-highlight-color: transparent; }
    body { overscroll-behavior: none; height: 100dvh; } /* dvh = Safari下部バー考慮 */
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 16px); }
    .safe-top { padding-top: calc(env(safe-area-inset-top, 0px) + 12px) !important; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    .tab-bar { padding-bottom: max(env(safe-area-inset-bottom), 12px); }
    ::-webkit-scrollbar { display: none; }
    .page { display: none; }
    .page.active { display: block; }
    select option { background-color: #1e1b4b; }
    .recharts-wrapper { font-family: -apple-system, sans-serif; }

    /* ===== LIGHT MODE ===== */
    body.light-mode { background-color: #f1f5f9; color: #1e293b; }
    body.light-mode #header,
    body.light-mode .tab-bar        { background-color: #ffffff !important; border-color: #e2e8f0 !important; }
    body.light-mode .bg-gray-950    { background-color: #f1f5f9 !important; }
    body.light-mode .bg-gray-900    { background-color: #ffffff !important; }
    body.light-mode .bg-gray-800    { background-color: #f1f5f9 !important; }
    body.light-mode .hover\:bg-gray-700:hover { background-color: #e2e8f0 !important; }
    body.light-mode .border-gray-800 { border-color: #e2e8f0 !important; }
    body.light-mode .border-gray-700 { border-color: #cbd5e1 !important; }
    body.light-mode .text-white      { color: #1e293b !important; }
    body.light-mode .text-gray-100   { color: #1e293b !important; }
    body.light-mode .text-gray-200   { color: #334155 !important; }
    body.light-mode .text-gray-300   { color: #475569 !important; }
    body.light-mode .text-gray-400   { color: #475569 !important; }
    body.light-mode .text-gray-500   { color: #64748b !important; }
    body.light-mode .text-gray-600   { color: #94a3b8 !important; }
    body.light-mode .text-gray-700   { color: #94a3b8 !important; }
    body.light-mode input, body.light-mode textarea, body.light-mode select {
      color: #1e293b !important; background-color: #ffffff !important; border-color: #e2e8f0 !important;
    }
    body.light-mode input::placeholder, body.light-mode textarea::placeholder { color: #94a3b8 !important; }
    body.light-mode #exercise-dropdown { background-color: #ffffff !important; border-color: #e2e8f0 !important; }
    body.light-mode #exercise-dropdown > div { color: #1e293b !important; }
    body.light-mode #exercise-dropdown > div:hover { background-color: #f1f5f9 !important; }
    body.light-mode #backup-modal > div { background-color: #ffffff !important; border-color: #e2e8f0 !important; }
    body.light-mode #edit-modal      { background-color: #f1f5f9 !important; }
    body.light-mode #edit-modal > div:first-child { background-color: #ffffff !important; border-color: #e2e8f0 !important; }
    body.light-mode #login-overlay   { background-color: #f1f5f9 !important; }
    body.light-mode select option    { background-color: #ffffff !important; color: #1e293b !important; }
    body.light-mode .bg-indigo-900   { background-color: #e0e7ff !important; }
    body.light-mode #gym-time-form   { border-color: #e2e8f0 !important; }
    /* インディゴ背景のボタンは文字を白に保つ（kg/lbs・保存・各種アクティブボタン） */
    body.light-mode .bg-indigo-600,
    body.light-mode .bg-indigo-700   { color: #ffffff !important; }
  </style>
</head>
<body class="dark bg-gray-950 text-gray-100 flex flex-col overflow-hidden" style="height:100dvh">

<div id="app" class="flex flex-col h-full">
  <!-- Header -->
  <div id="header" class="safe-top bg-gray-950 border-b border-gray-800 px-4 pb-3 flex-shrink-0 flex items-center justify-between">
    <h1 id="page-title" class="text-lg font-bold text-white">今日</h1>
    <div class="flex items-center gap-2">
      <div id="sync-indicator" class="hidden text-xs text-gray-600 flex items-center gap-1">
        <svg class="w-3 h-3 animate-spin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
        同期中
      </div>
      <img id="user-photo" class="hidden w-7 h-7 rounded-full object-cover border border-gray-700" alt="user" />
      <button id="theme-toggle-btn" class="text-gray-400 hover:text-gray-200 transition-colors p-1 rounded-lg" aria-label="テーマ切替">
        <svg id="theme-icon-sun" class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg id="theme-icon-moon" class="w-5 h-5 hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
      <button id="backup-btn" class="text-xs text-gray-400 font-medium px-2 py-1 rounded-lg border border-gray-700 hover:border-gray-500 transition-colors">メニュー</button>
    </div>
  </div>

  <!-- Menu Modal -->
  <div id="backup-modal" class="hidden fixed inset-0 z-50 flex items-end justify-center bg-black bg-opacity-60">
    <div class="w-full max-w-md bg-gray-900 rounded-t-3xl p-6 pb-10 border-t border-gray-700">
      <div class="flex items-center justify-between mb-5">
        <h2 class="text-base font-bold text-white">メニュー</h2>
        <button id="backup-modal-close" class="text-gray-500 text-xl leading-none">×</button>
      </div>
      <!-- Logged-in user info -->
      <div id="menu-user-section" class="hidden mb-4 p-3 bg-gray-800 rounded-2xl flex items-center gap-3">
        <img id="menu-user-photo" class="w-10 h-10 rounded-full object-cover" alt="user" />
        <div class="flex-1 min-w-0">
          <div id="menu-user-name" class="text-sm font-semibold text-white truncate"></div>
          <div id="menu-user-email" class="text-xs text-gray-500 truncate"></div>
        </div>
        <button id="signout-btn" class="text-xs text-red-400 font-medium flex-shrink-0">ログアウト</button>
      </div>
      <!-- Login button (shown when not logged in) -->
      <button id="menu-login-btn" class="hidden w-full bg-white text-gray-900 font-semibold py-3.5 rounded-2xl text-sm mb-3 flex items-center justify-center gap-2">
        <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleでログイン（端末間同期）
      </button>
      <div class="space-y-3">
        <button id="export-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3.5 rounded-2xl text-sm transition-colors flex items-center justify-center gap-2">
          <span>↓</span> JSONでエクスポート（バックアップ）
        </button>
        <label class="w-full bg-gray-800 hover:bg-gray-700 text-gray-200 font-semibold py-3.5 rounded-2xl text-sm transition-colors flex items-center justify-center gap-2 cursor-pointer border border-gray-700">
          <span>↑</span> JSONをインポート（復元）
          <input type="file" id="import-file" accept=".json" class="hidden" />
        </label>
        <p class="text-xs text-gray-600 text-center pt-1">ログイン中はデータが自動でクラウドに保存されます</p>
      </div>
    </div>
  </div>

  <!-- Login Overlay (shown when not logged in) -->
  <div id="login-overlay" class="hidden fixed inset-0 z-50 bg-gray-950 flex flex-col items-center justify-center p-8">
    <div class="text-5xl mb-5">🏋️</div>
    <h1 class="text-2xl font-bold text-white mb-2">Workout Tracker</h1>
    <p class="text-sm text-gray-500 mb-10 text-center leading-relaxed">Googleアカウントでログインすると<br>iPhone・MacBook 間でデータが同期されます</p>
    <button id="google-signin-btn" class="w-full max-w-xs bg-white text-gray-900 font-semibold py-4 rounded-2xl flex items-center justify-center gap-3 shadow-lg text-sm">
      <svg class="w-5 h-5 flex-shrink-0" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Googleでログイン
    </button>
    <p class="text-xs text-gray-700 mt-6 text-center">ログインせずにローカルのみで使う場合は<br><button id="skip-login-btn" class="text-gray-500 underline">スキップ</button></p>
  </div>

  <!-- Content -->
  <div class="flex-1 overflow-y-auto" id="content">
    <!-- Today Page -->
    <div id="page-today" class="page active p-4 pb-24">
      <div id="gym-time-section" class="bg-gray-900 rounded-2xl p-4 mb-4 border border-gray-800">
        <div class="flex items-center justify-between mb-3">
          <span class="text-sm font-semibold text-gray-400 uppercase tracking-wider">ジム時間</span>
          <button id="edit-gym-time-btn" class="text-xs text-indigo-400 font-medium">編集</button>
        </div>
        <div class="grid grid-cols-2 gap-3">
          <div>
            <div class="text-xs text-gray-500 mb-1">イン</div>
            <div id="display-gym-in" class="text-2xl font-bold text-indigo-400">--:--</div>
          </div>
          <div>
            <div class="text-xs text-gray-500 mb-1">アウト</div>
            <div id="display-gym-out" class="text-2xl font-bold text-indigo-400">--:--</div>
          </div>
        </div>
        <!-- Gym time edit form (hidden) -->
        <div id="gym-time-form" class="hidden mt-3 pt-3 border-t border-gray-800">
          <div class="grid grid-cols-2 gap-3 mb-3">
            <div>
              <label class="text-xs text-gray-500 block mb-1">イン</label>
              <input type="time" id="gym-in-input" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-indigo-500" />
            </div>
            <div>
              <label class="text-xs text-gray-500 block mb-1">アウト</label>
              <input type="time" id="gym-out-input" class="w-full bg-gray-800 border border-gray-700 rounded-xl px-3 py-2 text-white text-sm focus:outline-none focus:border-indigo-500" />
            </div>
          </div>
          <button id="save-gym-time-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-xl text-sm transition-colors">保存</button>
        </div>
      </div>

      <div class="flex items-center justify-between mb-3">
        <h2 class="text-base font-semibold text-gray-300">本日のトレーニング</h2>
        <button id="today-add-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-semibold px-4 py-2 rounded-xl flex items-center gap-1 transition-colors">
          <span class="text-lg leading-none">+</span> 追加
        </button>
      </div>

      <div id="today-entries" class="space-y-3">
        <div id="today-empty" class="text-center py-12 text-gray-600">
          <div class="text-4xl mb-3">🏋️</div>
          <div class="text-sm">まだ記録がありません</div>
          <div class="text-xs mt-1 text-gray-700">「追加」ボタンから記録してください</div>
        </div>
      </div>
    </div>

    <!-- Add Entry Page -->
    <div id="page-add" class="page p-4 pb-24">
      <div class="space-y-4">
        <!-- Date -->
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">日付</label>
          <input type="date" id="add-date" class="w-full bg-gray-900 border border-gray-800 rounded-2xl px-4 py-3 text-white text-base focus:outline-none focus:border-indigo-500 transition-colors" />
        </div>

        <!-- Muscle Group -->
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">部位</label>
          <div class="flex flex-wrap gap-2" id="muscle-group-btns">
            <button class="muscle-btn px-4 py-2.5 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400" data-muscle="胸">胸</button>
            <button class="muscle-btn px-4 py-2.5 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400" data-muscle="背中">背中</button>
            <button class="muscle-btn px-4 py-2.5 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400" data-muscle="脚">脚</button>
            <button class="muscle-btn px-4 py-2.5 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400" data-muscle="肩">肩</button>
            <button class="muscle-btn px-4 py-2.5 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400" data-muscle="腕">腕</button>
            <button class="muscle-btn px-4 py-2.5 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400" data-muscle="腹">腹</button>
          </div>
        </div>

        <!-- Gym In/Out -->
        <div class="grid grid-cols-2 gap-3">
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">ジムイン</label>
            <input type="time" id="add-gym-in" class="w-full bg-gray-900 border border-gray-800 rounded-2xl px-4 py-3 text-white text-base focus:outline-none focus:border-indigo-500 transition-colors" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">ジムアウト</label>
            <input type="time" id="add-gym-out" class="w-full bg-gray-900 border border-gray-800 rounded-2xl px-4 py-3 text-white text-base focus:outline-none focus:border-indigo-500 transition-colors" />
          </div>
        </div>

        <!-- Exercise -->
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">種目</label>
          <div class="relative">
            <input
              type="text"
              id="exercise-input"
              placeholder="種目を入力または選択..."
              autocomplete="off"
              class="w-full bg-gray-900 border border-gray-800 rounded-2xl px-4 py-3 text-white text-base focus:outline-none focus:border-indigo-500 transition-colors"
            />
            <div id="exercise-dropdown" class="hidden absolute z-50 w-full mt-1 bg-gray-800 border border-gray-700 rounded-2xl overflow-hidden shadow-xl max-h-48 overflow-y-auto"></div>
          </div>
        </div>

        <!-- Weight Unit -->
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">重量単位</label>
          <div class="flex gap-2">
            <button id="unit-kg" class="flex-1 py-3 rounded-2xl text-sm font-semibold border transition-colors bg-indigo-600 border-indigo-600 text-white">kg</button>
            <button id="unit-lbs" class="flex-1 py-3 rounded-2xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400">lbs</button>
          </div>
        </div>

        <!-- Sets -->
        <div>
          <div class="mb-2">
            <label class="text-xs font-semibold text-gray-400 uppercase tracking-wider">セット</label>
          </div>
          <div id="sets-container" class="space-y-2">
            <!-- Set rows rendered by JS -->
          </div>
        </div>

        <!-- Add Set -->
        <button id="add-set-btn" class="w-full text-sm text-indigo-400 font-semibold py-3 rounded-2xl border border-indigo-800 hover:bg-indigo-900 transition-colors">+ セット追加</button>

        <!-- Memo -->
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">メモ</label>
          <textarea id="add-memo" rows="3" placeholder="気づいたこと、注意点など..." class="w-full bg-gray-900 border border-gray-800 rounded-2xl px-4 py-3 text-white text-base focus:outline-none focus:border-indigo-500 transition-colors resize-none placeholder-gray-700"></textarea>
        </div>

        <!-- Save -->
        <button id="save-entry-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl text-base transition-colors mt-2">
          保存する
        </button>
      </div>
    </div>

    <!-- History Page -->
    <div id="page-history" class="page p-4 pb-24">
      <!-- Muscle group filter pills -->
      <div id="history-muscle-pills" class="flex gap-2 overflow-x-auto pb-2 -mx-4 px-4 mb-2" style="scrollbar-width:none;-webkit-overflow-scrolling:touch"></div>
      <!-- Exercise filter -->
      <div id="history-exercise-wrap" class="hidden mb-3">
        <select id="history-exercise-select-filter" class="w-full bg-gray-900 border border-gray-800 rounded-xl px-3 py-2.5 text-white text-sm focus:outline-none focus:border-indigo-500 appearance-none">
          <option value="">すべての種目</option>
        </select>
      </div>
      <!-- View toggle -->
      <div class="flex items-center justify-end mb-3">
        <div class="flex bg-gray-900 border border-gray-800 rounded-xl p-0.5">
          <button id="history-list-btn" class="history-view-btn px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors bg-indigo-600 text-white" data-mode="list">リスト</button>
          <button id="history-cal-btn" class="history-view-btn px-3 py-1.5 rounded-lg text-xs font-semibold transition-colors text-gray-500" data-mode="calendar">カレンダー</button>
        </div>
      </div>
      <div id="history-list" class="space-y-3">
        <div id="history-empty" class="text-center py-12 text-gray-600">
          <div class="text-4xl mb-3">📅</div>
          <div class="text-sm">まだ記録がありません</div>
        </div>
      </div>
    </div>

    <!-- Graph Page -->
    <div id="page-graph" class="page p-4 pb-24">
      <div class="mb-4">
        <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">種目を選択</label>
        <select id="graph-exercise-select" class="w-full bg-gray-900 border border-gray-800 rounded-2xl px-4 py-3 text-white text-base focus:outline-none focus:border-indigo-500 appearance-none">
          <option value="">種目を選択してください</option>
        </select>
      </div>
      <div class="mb-3 flex gap-2">
        <button id="graph-weight-btn" class="flex-1 py-2 rounded-xl text-sm font-semibold border transition-colors bg-indigo-600 border-indigo-600 text-white">最大重量</button>
        <button id="graph-volume-btn" class="flex-1 py-2 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400">総ボリューム</button>
      </div>
      <div id="graph-container" class="bg-gray-900 rounded-2xl border border-gray-800 p-4">
        <div id="graph-empty" class="text-center py-12 text-gray-600">
          <div class="text-4xl mb-3">📊</div>
          <div class="text-sm">種目を選択するとグラフが表示されます</div>
        </div>
        <canvas id="graph-canvas" class="hidden w-full" style="height: 250px;"></canvas>
        <div id="graph-stats" class="hidden mt-4 grid grid-cols-3 gap-2"></div>
      </div>
    </div>
  </div>

  <!-- Edit Entry Modal -->
  <div id="edit-modal" class="hidden fixed inset-0 z-40 bg-gray-950 flex flex-col">
    <div class="safe-top bg-gray-950 border-b border-gray-800 px-4 py-3 flex items-center justify-between flex-shrink-0">
      <button id="edit-cancel-btn" class="text-sm text-gray-400 font-medium px-1 py-1">キャンセル</button>
      <h2 class="text-base font-bold text-white">記録を編集</h2>
      <button id="edit-save-btn" class="text-sm text-indigo-400 font-semibold px-1 py-1">保存</button>
    </div>
    <div class="flex-1 overflow-y-auto p-4">
      <div class="space-y-4 pb-8">
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">種目</label>
          <div id="edit-exercise-display" class="bg-gray-900 border border-gray-800 rounded-2xl px-4 py-3 text-white text-base font-semibold"></div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">部位</label>
          <div class="flex flex-wrap gap-2" id="edit-muscle-btns">
            <button class="edit-muscle-btn px-4 py-2.5 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400" data-muscle="胸">胸</button>
            <button class="edit-muscle-btn px-4 py-2.5 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400" data-muscle="背中">背中</button>
            <button class="edit-muscle-btn px-4 py-2.5 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400" data-muscle="脚">脚</button>
            <button class="edit-muscle-btn px-4 py-2.5 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400" data-muscle="肩">肩</button>
            <button class="edit-muscle-btn px-4 py-2.5 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400" data-muscle="腕">腕</button>
            <button class="edit-muscle-btn px-4 py-2.5 rounded-xl text-sm font-semibold border transition-colors bg-gray-900 border-gray-800 text-gray-400" data-muscle="腹">腹</button>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">重量単位</label>
          <div class="flex gap-2">
            <button id="edit-unit-kg" class="flex-1 py-3 rounded-2xl text-sm font-semibold border transition-colors" data-unit="kg">kg</button>
            <button id="edit-unit-lbs" class="flex-1 py-3 rounded-2xl text-sm font-semibold border transition-colors" data-unit="lbs">lbs</button>
          </div>
        </div>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">セット</label>
          <div id="edit-sets-container" class="space-y-2"></div>
        </div>
        <button id="edit-add-set-btn" class="w-full text-sm text-indigo-400 font-semibold py-3 rounded-2xl border border-indigo-800 hover:bg-indigo-900 transition-colors">+ セット追加</button>
        <div>
          <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">メモ</label>
          <textarea id="edit-memo" rows="3" placeholder="気づいたこと、注意点など..." class="w-full bg-gray-900 border border-gray-800 rounded-2xl px-4 py-3 text-white text-base focus:outline-none focus:border-indigo-500 transition-colors resize-none placeholder-gray-700"></textarea>
        </div>
      </div>
    </div>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar flex-shrink-0 bg-gray-950 border-t border-gray-800 flex">
    <button class="tab-btn flex-1 flex flex-col items-center py-2 gap-0.5" data-tab="today">
      <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
        <line x1="16" y1="2" x2="16" y2="6"/>
        <line x1="8" y1="2" x2="8" y2="6"/>
        <line x1="3" y1="10" x2="21" y2="10"/>
      </svg>
      <span class="text-xs">今日</span>
    </button>
    <button class="tab-btn flex-1 flex flex-col items-center py-2 gap-0.5" data-tab="add">
      <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
      <span class="text-xs">記録追加</span>
    </button>
    <button class="tab-btn flex-1 flex flex-col items-center py-2 gap-0.5" data-tab="history">
      <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2v10l4 2"/>
        <circle cx="12" cy="12" r="10"/>
      </svg>
      <span class="text-xs">履歴</span>
    </button>
    <button class="tab-btn flex-1 flex flex-col items-center py-2 gap-0.5" data-tab="graph">
      <svg class="w-6 h-6" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
      </svg>
      <span class="text-xs">グラフ</span>
    </button>
  </div>
</div>

<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
